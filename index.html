<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div>
            <h1>Calcule meu IMC</h1>
        </div>
        <label for="" id="altura">Altura</label> <br>
            <input type="number" placeholder="Insira sua altura, em metros(s)"> <br>
        <label for="" id="peso">Peso</label> <br>
            <input type="text" placeholder="Insira seu peso, em quilogramas"><br>
        <button id="calcular">Calcular Meu IMC</button>
        <span id="resultado"></span>
    </div>
    <div class="container2">
        <div id="massa">
            <div>IMC</div>
            <div>IMC < 18,5 Kg/m2</div>
            <div>IMC > 18,5 e < 24,9 Kg/m2</div>
            <div>IMC > 25 e < 29,9 Kg/m2</div>
            <div>IMC > 30 Kg/m2</div>
            <div>IMC > 30 e < 34,9 Kg/m2</div>
            <div>IMC > 35 e < 39,9 Kg/m2</div>
            <div>IMC > 40 Kg/m2<Kg></div>
        </div>
        <div id="classificacao">
            <div>Classificação</div>
            <div>Baixo Peso</div>
            <div>Peso Normal</div>
            <div>Execesso de Peso</div>
            <div>Obesidade</div>
            <div>Obesidade classe I</div>
            <div>Obesidade classe II</div>
            <div>Obesidade Mórbida</div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
